name: ci

# Linux-only matrix on purpose: GitHub-hosted macOS runners are billed at
# 10× Linux. There's no native code or platform-specific behavior in this
# repo (modernc.org/sqlite is pure Go), so Linux coverage is sufficient.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Security/license/binary-build jobs run against latest stable Go so
  # govulncheck sees stdlib fixes. `stable` resolves to the newest
  # released minor (currently 1.26.x) which has all 1.25.10 std-lib
  # fixes folded in. The matrix coverage job below tests against the
  # floor (1.24.x) AND latest (1.25.x) explicitly.
  GO_VERSION: "stable"
  NODE_VERSION: "22"

jobs:
  lint-test-cover:
    name: lint + test + coverage (go${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the floor and the latest stable. The floor is what
        # go.mod declares; bumping the floor is its own PR.
        go: ["1.24.x", "1.25.x"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: golangci-lint
        # Source of truth for style + most static checks. Configured via
        # .golangci.yml (v2 schema). Pin the action by SHA, not by
        # floating tag — Dependabot rotates these automatically.
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Build
        # Catches build breaks that go vet / lint don't, and warms the
        # build cache for the test step.
        run: go build ./...

      - name: Test (with coverage profile)
        # `-covermode=atomic` is required for race-safe per-package counters
        # when -coverpkg covers more than one package. `-coverpkg=./...`
        # captures cross-package calls (e.g. tests in `engine/` exercising
        # `internal/dispatcher` count toward dispatcher's coverage).
        run: go test -race -covermode=atomic -coverprofile=cover.out -coverpkg=./... ./...

      - name: Coverage gate (≥ 90% repo / 90% package / 70% file)
        # Configured by .testcoverage.yml. Fails the job when any threshold
        # is missed. Until sprint 2/3 of PI 1 close, this job is EXPECTED
        # to fail — that's the policy: gate is set; coverage rises to meet
        # it before the first merge to main.
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        with:
          config: ./.testcoverage.yml
          profile: cover.out

  security-go:
    name: gosec + govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      # gosec / govulncheck are installed via `go install` rather than
      # via their wrapper actions because both wrappers ship a bundled
      # older Go (1.23.x) that can't load this module's go.mod (Go 1.24+
      # floor). Installing directly inherits the version selected by
      # actions/setup-go above.
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.0

      - name: gosec
        # Static security analysis — common Go security smells. `-severity
        # medium` matches the bandit `-ll` posture used by the reference
        # template. Tests are excluded; assert / temp-file patterns
        # produce noise without security signal.
        run: gosec -severity medium -exclude-dir=examples -exclude-dir=web -exclude=G104 ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        # Resolves the dep tree against the live Go vulnerability DB.
        # Equivalent in spirit to pip-audit for Python.
        run: govulncheck ./...

  licenses:
    name: license policy (block GPL/AGPL/SSPL/BUSL/Elastic/Commons-Clause)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - name: Check
        # Block forbidden licenses across the resolved dep graph (direct
        # AND transitive). LGPL stays acceptable (weak-copyleft / dynamic
        # linking), matching the policy in ai-assistant-client.
        run: |
          go-licenses check ./... \
            --disallowed_types=forbidden,restricted \
            --ignore=github.com/ryan-evans-git/signalwatch

  trivy:
    name: trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy filesystem scan
        # Catches CVEs in OS packages declared by Dockerfiles + any known-
        # vulnerable lockfile entries (gomod, npm). Matches the reference's
        # CRITICAL/HIGH posture with --ignore-unfixed.
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  web-build:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: tsc + vite build
        working-directory: web
        run: npm run build

  binary-build:
    name: binary build (sanity)
    runs-on: ubuntu-latest
    needs: [web-build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build UI then binary
        # Confirms the embed.FS picks up freshly-built assets and the
        # release binary still cross-compiles cleanly.
        run: |
          (cd web && npm ci && npm run build)
          go build -o bin/signalwatch ./cmd/signalwatch
          go build -o bin/signalwatchctl ./cmd/signalwatchctl
          ls -lh bin/
