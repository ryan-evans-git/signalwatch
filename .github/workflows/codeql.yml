name: codeql

# GitHub-native SAST. Free for public repos. Runs on push to main, on PRs,
# and weekly to catch new query-pack rules against unchanged code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — outside US-business-hours so it doesn't compete
    # with PR runs for runner capacity.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write   # required for SARIF upload to the Security tab
  actions: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover both languages this repo ships. Add more as packages
        # diversify.
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e8e594e8799b6bc05d33c13d3d14e484b7b9cbc0 # v3.29.4
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds higher-signal queries beyond the
          # default set. `security-and-quality` would also add maintain-
          # ability rules — out of scope for a security scan, so stop at
          # `security-extended`.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@e8e594e8799b6bc05d33c13d3d14e484b7b9cbc0 # v3.29.4

      - name: Analyze
        uses: github/codeql-action/analyze@e8e594e8799b6bc05d33c13d3d14e484b7b9cbc0 # v3.29.4
        with:
          category: "/language:${{ matrix.language }}"
