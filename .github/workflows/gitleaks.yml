name: gitleaks

# Scan every push + PR for accidentally committed secrets. The action
# defaults to the upstream gitleaks ruleset (AWS keys, GitHub tokens,
# Anthropic / OpenAI / Google keys, generic high-entropy strings, etc.).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the scan covers every commit reachable from
          # the PR head, not just the diff. Without this a secret
          # introduced and "removed" in the same PR would slip through.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `GITLEAKS_LICENSE` is only required for orgs with >25 users.
          # Personal repos don't need it.
