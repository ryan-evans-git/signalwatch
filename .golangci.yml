version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: var-naming
        - name: exported
          arguments:
            - sayRepetitiveInsteadOfStutters
        - name: package-comments
        - name: indent-error-flow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - gocyclo
        path: cmd/.*/main\.go
    paths:
      - web/node_modules
      - internal/ui/dist
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - web/node_modules
      - internal/ui/dist
      - third_party$
      - builtin$
      - examples$
