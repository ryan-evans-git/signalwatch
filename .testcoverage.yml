# Config for vladopajic/go-test-coverage.
# Docs: https://github.com/vladopajic/go-test-coverage
#
# The thresholds below are POLICY, not aspiration: PRs that drop coverage
# below these levels are blocked. They went green on 2026-05-12 via
# sprint 2 + 3; new code MUST keep them green.

profile: cover.out

local-prefix: github.com/ryan-evans-git/signalwatch

threshold:
  total: 90       # repo-wide branch coverage
  package: 90     # any single package
  file: 70        # any single file (looser to allow rare-but-justified outliers)

# Files we genuinely never test directly. Each entry needs a one-line reason.
exclude:
  paths:
    # Process entry points are exercised end-to-end by integration tests but
    # the main() function itself is glue. Inner logic should be extracted to
    # testable helpers; see PI-PLAN sprint 3.
    - cmd/signalwatch/main.go
    - cmd/signalwatchctl/main.go
    # Examples are documentation, not production code.
    - examples/
    # Test-helper packages are exercised transitively by every driver-
    # specific *_test.go but the cross-package coverage profile (Go test
    # emits one row per (file, position) per test run, and the merger
    # picks the last value seen) collapses their per-package count to
    # zero. They're not production code; they're the conformance suite
    # itself.
    - internal/store/storetest/
    # The Postgres store's tests are tagged `integration` and run via
    # the test-postgres CI job (testcontainers-go spinning up a real
    # Postgres). They contribute no coverage to the default `go test
    # ./...` invocation that this gate measures. The test-postgres job
    # is itself required to pass on every PR via branch protection.
    - internal/store/postgres/
    # MySQL store: same rationale as postgres above. Tests are tagged
    # `integration` and run via the test-mysql CI job.
    - internal/store/mysql/
    # RabbitMQ production adapter file — pure passthroughs wrapping
    # *amqp.Connection / *amqp.Channel so tests can swap the dialer.
    # Exercisable only against a real broker; the test-rabbitmq CI job
    # covers it via testcontainers-go.
    - internal/input/stream/rabbitmq/realadapter.go

# Regenerate cover.out via:
#   go test -coverprofile=cover.out -coverpkg=./... -covermode=atomic ./...
